 #reusable-deploy-function.yml

    # =================================================================================
    # Reusable Workflow for Deploying Serverless Applications to Google Cloud
    # =================================================================================
    #
    # This workflow provides a standardized, secure, and automated pipeline for
    # deploying containerized applications to Google Cloud Run.
    #
    # It supports both production deployments on a push to `main` and the creation
    # of temporary preview environments for Pull Requests.
    #
    # ---------------------------------------------------------------------------------
    # Usage Example (in the application's workflow file):
    # ---------------------------------------------------------------------------------
    #
    # jobs:
    #   deploy:
    #     uses: your-org/your-repo/.github/workflows/reusable-deploy-function.yml@main
    #     with:
    #       project_id: 'your-gcp-project-id'
    #       source_folder: './path/to/your/app/code'
    #       app_name: 'your-app-name'
    #       region: 'us-central1' # Optional, defaults to us-central1
    #     secrets:
    #       GCP_WIF_PROVIDER: ${{ secrets.GCP_WIF_PROVIDER }}
    #       GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SA_EMAIL }}
    #
    # ---------------------------------------------------------------------------------

name: Reusable Serverless Deployment

on:
  workflow_call:
    inputs:
      project_id:
        required: true
        type: string
      source_folder:
        required: true
        type: string
      app_name:
        required: true
        type: string
      region:
        required: false
        type: string
        default: 'us-central1'
    secrets:
      GCP_WIF_PROVIDER:
        required: true
      GCP_SERVICE_ACCOUNT:
        required: true

jobs:
  deploy-preview:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      pull-requests: 'write'
      id-token: 'write'

    steps:
      - name: 'Checkout Code'
        uses: actions/checkout@v4

      - name: 'Authenticate to GCP'
        id: 'auth'
        uses: 'google-github-actions/auth@v2'
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v2'

      - name: 'Docker - Authenticate to Artifact Registry'
        run: gcloud auth configure-docker ${{ inputs.region }}-docker.pkg.dev

      - name: 'Docker - Build and Tag Image'
        run: |
          docker build -t "${{ inputs.region }}-docker.pkg.dev/${{ inputs.project_id }}/${{ inputs.app_name }}-repo/${{ inputs.app_name }}:pr-${{ github.event.number }}-${{ github.sha }}" "${{ inputs.source_folder }}"

      - name: 'Docker - Push Image'
        run: |
          docker push "${{ inputs.region }}-docker.pkg.dev/${{ inputs.project_id }}/${{ inputs.app_name }}-repo/${{ inputs.app_name }}:pr-${{ github.event.number }}-${{ github.sha }}"

      # --- MODIFIED STEP ---
      # The 'id' and output capturing have been removed from this step.
      # Its only job is to deploy.
      - name: 'Deploy to Cloud Run'
        run: |
          gcloud run deploy ${{ inputs.app_name }}-pr-${{ github.event.number }} \
            --image="${{ inputs.region }}-docker.pkg.dev/${{ inputs.project_id }}/${{ inputs.app_name }}-repo/${{ inputs.app_name }}:pr-${{ github.event.number }}-${{ github.sha }}" \
            --region=${{ inputs.region }} \
            --allow-unauthenticated \
            --service-account=${{ secrets.GCP_SERVICE_ACCOUNT }}

      # --- NEW STEP ---
      # This new step reliably gets the URL after the service has been deployed.
      - name: 'Get Preview URL'
        id: get_url
        run: |
          URL=$(gcloud run services describe ${{ inputs.app_name }}-pr-${{ github.event.number }} \
            --region=${{ inputs.region }} \
            --format='value(status.url)')
          echo "url=$URL" >> $GITHUB_OUTPUT

      # --- MODIFIED STEP ---
      # This step now references the new 'get_url' step for the output.
      - name: 'Post Preview URL as PR Comment'
        uses: actions/github-script@v7
        with:
          script: |
            const previewUrl = "${{ steps.get_url.outputs.url }}";
            const commentBody = `🚀 Preview environment deployed successfully!

            URL: **${previewUrl}**`;
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: commentBody
            });