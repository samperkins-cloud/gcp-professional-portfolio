# .github/workflows/deploy-to-prod.yml
    name: Deploy to Production

    on:
      push:
        branches: [ main ]
        paths:
          - 'projects/08-automated-functions-deployment/apps/**'

    jobs:
      promote-to-prod:
        runs-on: ubuntu-latest
        permissions:
          contents: 'read'
          id-token: 'write'

        steps:
        - name: Checkout
          uses: actions/checkout@v4
          with:
            fetch-depth: 0 # Fetch all history to be safe

        - name: Extract PR Number from Merge Commit
          id: get_pr
          run: |
            PR_NUMBER=$(git log -1 --pretty=%B | grep -oP '(?<=#)\d+' | head -1)
            if [ -z "$PR_NUMBER" ]; then
              echo "Could not find PR number in merge commit. This was likely a direct push."
              # You could choose to fail here, or build a new image as a fallback
              exit 1
            fi
            echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT

        - name: 'Deploy to Production'
          run: |
            PR_TAG="pr-${{ steps.get_pr.outputs.pr_number }}"
            gcloud run deploy my-etl-function \
              --image="us-central1-docker.pkg.dev/.../my-etl-function:$PR_TAG" \