# .github/workflows/build-and-preview.yml
name: Build and Preview

on:
  pull_request:
    paths:
      - 'projects/08-automated-functions-deployment/apps/**'

jobs:
  build-and-deploy-preview:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      pull-requests: 'write'
      id-token: 'write'

    steps:
      - name: 'Checkout Code'
        uses: actions/checkout@v4

      - name: 'Authenticate to GCP'
        uses: 'google-github-actions/auth@v2'
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v2'

      - name: 'Docker - Authenticate to Artifact Registry'
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: 'Docker - Build and Push Image'
        run: |
          # Define the tag based on the PR number
          PR_TAG="pr-${{ github.event.pull_request.number }}"
          
          # Construct the full, correct image URI
          IMAGE_URI="us-central1-docker.pkg.dev/my-portfolio-project-v2-484602/my-etl-function-repo/my-etl-function:$PR_TAG"
          
          # Build the image
          docker build -t $IMAGE_URI ./projects/08-automated-functions-deployment/apps/
          
          # Push the image
          docker push $IMAGE_URI

      - name: 'Deploy to Preview Environment'
        id: deploy # Give the step an ID to capture its output
        run: |
          # Define the tag again for this step
          PR_TAG="pr-${{ github.event.pull_request.number }}"
          
          # Construct the full, correct image URI again
          IMAGE_URI="us-central1-docker.pkg.dev/my-portfolio-project-v2-484602/my-etl-function-repo/my-etl-function:$PR_TAG"
          
          # Run the deploy command and capture the URL
          URL=$(gcloud run deploy my-etl-function-pr-${{ github.event.pull_request.number }} \
            --image=$IMAGE_URI \
            --region=us-central1 \
            --allow-unauthenticated \
            --service-account=${{ secrets.GCP_SA_EMAIL }} \
            --format='value(uri)')
            
          # Make the URL available to the next step
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: 'Post Preview URL as PR Comment'
        uses: actions/github-script@v7
        with:
          script: |
            const previewUrl = "${{ steps.deploy.outputs.url }}";
            const commentBody = `✅ Build successful! Preview deployed: **${previewUrl}**`;
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: commentBody
            });