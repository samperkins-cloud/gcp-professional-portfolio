 # .github/workflows/build-and-preview.yml
    name: Build and Preview

    on:
      pull_request:
        paths:
          - 'projects/08-automated-functions-deployment/apps/**'

    jobs:
      build-and-deploy-preview:
        runs-on: ubuntu-latest
        permissions:
          contents: 'read'
          pull-requests: 'write'
          id-token: 'write'

        steps:
          - name: 'Checkout Code'
            uses: actions/checkout@v4

          - name: 'Authenticate to GCP'
            uses: 'google-github-actions/auth@v2'
            with:
              workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
              service_account: ${{ secrets.GCP_SA_EMAIL }}

          - name: 'Set up Cloud SDK'
            uses: 'google-github-actions/setup-gcloud@v2'

          - name: 'Docker - Authenticate to Artifact Registry'
            run: gcloud auth configure-docker us-central1-docker.pkg.dev

          - name: 'Docker - Build and Push Image'
            run: |
              PR_TAG="pr-${{ github.event.pull_request.number }}"
              IMAGE_URI="us-central1-docker.pkg.dev/.../my-etl-function:$PR_TAG"
              
              docker build -t $IMAGE_URI ./projects/08-automated-functions-deployment/apps/
              docker push $IMAGE_URI

          - name: 'Deploy to Preview Environment'
            run: |
              PR_TAG="pr-${{ github.event.pull_request.number }}"
              gcloud run deploy my-etl-function-pr-${{ github.event.pull_request.number }} \
                --image="us-central1-docker.pkg.dev/.../my-etl-function:$PR_TAG" \
                # ... other args

          - name: 'Post Preview URL as PR Comment'
            uses: actions/github-script@v7
            with:
              script: |
                const previewUrl = "${{ steps.deploy.outputs.url }}";
                const commentBody = `✅ Build successful! Preview deployed: **${previewUrl}**`;
                github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body: commentBody
                });